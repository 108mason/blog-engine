name: Post Scheduled Social

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

concurrency:
  group: social
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Post due social items
        run: node scripts/social-post.js
        env:
          TWITTER_API_KEY:      ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:   ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          FACEBOOK_PAGE_ID:     ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}

      - name: Commit updated queue
        run: |
          git config user.name "Sacred Roots Bot"
          git config user.email "bot@sacred-roots.com"
          git add blog/data/social-queue.json
          git diff --staged --quiet || (git commit -m "chore: update social queue" && git pull --rebase && git push)
