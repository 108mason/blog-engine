name: Convert Content to Draft

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Converter type: youtube | twitter | podcast | url'
        required: true
        type: string
      source_url:
        description: 'Source URL to convert'
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  convert:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Convert content
        run: node scripts/convert.js --type "${{ inputs.type }}" --url "${{ inputs.source_url }}"
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}

      - name: Commit new draft
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/data/posts.json
          git commit -m "chore: add converted draft from ${{ inputs.type }}" || echo "Nothing to commit"
          git push || echo "Nothing to push"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload blog/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
