<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sacred Roots — Content Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">🌿 Sacred Roots Content Hub</a>
    <nav class="header-nav">
      <a href="converter.html" class="btn-nav">🔄 Converter</a>
    </nav>
    <div class="header-actions">
      <span id="statsBar"></span>
      <button class="btn btn-sm" id="dimToggle" title="Toggle dim mode">🌙</button>
      <button class="btn btn-sm" id="settingsBtn">⚙ Settings</button>
      <button class="btn btn-primary btn-sm" id="scanBtn">▶ Run Scan</button>
    </div>
  </div>
</header>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>Settings</h3>
    <label>GitHub Personal Access Token
      <small>Needs <code>repo</code> scope — write access to both repos</small>
      <input type="password" id="patInput" placeholder="github_pat_..." />
    </label>
    <label style="margin-top:1rem;display:block">Anthropic API Key
      <small>Used to draft social posts directly in the browser</small>
      <input type="password" id="anthropicKeyInput" placeholder="sk-ant-..." />
    </label>
    <div class="modal-actions">
      <button class="btn btn-primary" id="savePat">Save</button>
      <button class="btn" id="closeSettings">Cancel</button>
    </div>
  </div>
</div>

<!-- No PAT warning -->
<div id="noPat" class="notice notice-warn" style="display:none">
  ⚠ No GitHub token set. <button class="btn btn-sm" onclick="document.getElementById('settingsBtn').click()">Add token</button> to enable publishing to Sacred Roots.
</div>

<!-- Main -->
<main class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="drafts">Drafts <span class="pill" id="draftCount">0</span></button>
    <button class="tab-btn" data-tab="published">Published <span class="pill" id="pubCount">0</span></button>
    <button class="tab-btn" data-tab="social">Social <span class="pill" id="socialCount">0</span></button>
  </div>

  <!-- Drafts -->
  <div id="tabDrafts">
    <div id="draftsList"><p class="muted">Loading drafts…</p></div>
  </div>

  <!-- Published -->
  <div id="tabPublished" style="display:none">
    <div id="publishedList"><p class="muted">Loading…</p></div>
  </div>

  <!-- Social -->
  <div id="tabSocial" style="display:none">
    <div id="socialList"><p class="muted">Loading…</p></div>
  </div>

</main>

<!-- Social Compose Modal -->
<div class="modal-overlay" id="socialModal">
  <div class="modal social-modal">
    <h3 id="socialModalTitle">Schedule Social Post</h3>
    <div id="socialPlatforms"></div>
    <div class="modal-actions" style="flex-wrap:wrap;gap:.75rem;margin-top:1rem">
      <button class="btn btn-humanize btn-sm" id="draftAllBtn">✨ Draft with Claude</button>
      <div style="flex:1"></div>
      <label style="font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.5rem">
        Schedule for <input type="datetime-local" id="scheduledFor" />
      </label>
      <button class="btn btn-primary" id="confirmSchedule">Schedule</button>
      <button class="btn" id="closeSocialModal">Cancel</button>
    </div>
  </div>
</div>

<script src="js/hub.js" type="module"></script>
</body>
</html>
