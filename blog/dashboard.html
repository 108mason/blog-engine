<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Rooted & Rising</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Login Screen (shown if not authenticated) ── -->
<div id="loginScreen">
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">Rooted <span>&</span> Rising</a>
    </div>
  </header>
  <div class="dash-login">
    <h2>Dashboard Login</h2>
    <p style="color:var(--muted);margin-bottom:1.5rem">Enter your dashboard password to continue.</p>
    <input type="password" id="pwInput" placeholder="Password" />
    <button class="btn btn-green" style="width:100%" id="loginBtn">Login</button>
    <p id="loginError" style="color:#DC2626;margin-top:.75rem;display:none">Incorrect password. Try again.</p>
  </div>
</div>

<!-- ── Dashboard (hidden until authenticated) ── -->
<div id="dashboardApp" style="display:none">

  <div class="dash-header">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center">
      <h1>✦ Content Dashboard</h1>
      <div style="display:flex;gap:1rem;align-items:center">
        <span id="statsBar" style="font-size:.85rem;opacity:.8"></span>
        <button class="btn btn-outline" id="logoutBtn" style="padding:.35rem .85rem;font-size:.85rem">Logout</button>
      </div>
    </div>
  </div>

  <div class="container" style="padding-top:2rem;padding-bottom:4rem">
    <!-- Tabs -->
    <div class="dash-tabs">
      <button class="tab-btn active" data-tab="drafts">Drafts <span id="draftCount" class="score-pill" style="margin-left:.4rem">0</span></button>
      <button class="tab-btn" data-tab="published">Published <span id="pubCount" class="score-pill" style="margin-left:.4rem">0</span></button>
    </div>

    <!-- Drafts Tab -->
    <div id="tabDrafts">
      <div id="draftsList">
        <p style="color:var(--muted)">Loading drafts…</p>
      </div>
    </div>

    <!-- Published Tab -->
    <div id="tabPublished" style="display:none">
      <div id="publishedList">
        <p style="color:var(--muted)">Loading published posts…</p>
      </div>
    </div>
  </div>

</div>

<script src="js/dashboard.js" type="module"></script>
</body>
</html>
